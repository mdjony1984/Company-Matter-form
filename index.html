<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Court Records</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<style>
    body { font-family: 'Times New Roman', serif; }
    table { font-size: 14px; }
</style>
</head>
<body class="p-4">
<h2 class="mb-4">Court Records Entry</h2>
<form id="recordForm" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">Case Type</label>
        <input type="text" class="form-control" value="Company Matter" readonly>
    </div>
    <div class="col-md-4">
        <label class="form-label">Case Number</label>
        <input type="text" id="caseNumber" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Year</label>
        <input type="number" id="year" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Sent Court</label>
        <input type="text" id="sentCourt" list="sentCourtList" class="form-control">
        <datalist id="sentCourtList">
            <option value="31(B-71)">
            <option value="25(M)">
            <option value="34(A)">
        </datalist>
    </div>
    <div class="col-md-4">
        <label class="form-label">Sent Date</label>
        <input type="text" id="sentDate" class="form-control" placeholder="dd/mm/yyyy">
    </div>
    <div class="col-md-4">
        <label class="form-label">Received Court</label>
        <input type="text" id="receivedCourt" list="receivedCourtList" class="form-control">
        <datalist id="receivedCourtList">
            <option value="31(B-71)">
            <option value="25(M)">
            <option value="34(A)">
        </datalist>
    </div>
    <div class="col-md-4">
        <label class="form-label">Received Date</label>
        <input type="text" id="receivedDate" class="form-control" placeholder="dd/mm/yyyy">
    </div>
    <div class="col-md-4">
        <label class="form-label">Typist Name</label>
        <input type="text" id="typistName" class="form-control">
    </div>
    <div class="col-md-4">
        <label class="form-label">Typist Date</label>
        <input type="text" id="typistDate" class="form-control" placeholder="dd/mm/yyyy">
    </div>
    <div class="col-md-4">
        <label class="form-label">A.R Date</label>
        <input type="text" id="arDate" class="form-control" placeholder="dd/mm/yyyy">
    </div>
    <div class="col-md-4">
        <label class="form-label">Dispatch Date</label>
        <input type="text" id="dispatchDate" class="form-control" placeholder="dd/mm/yyyy">
    </div>
    <div class="col-md-4">
        <label class="form-label">R.A Date</label>
        <input type="text" id="raDate" class="form-control" placeholder="dd/mm/yyyy">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Add Record</button>
        <button type="button" class="btn btn-success" onclick="generatePDF()">PDF</button>
        <button type="button" class="btn btn-secondary" onclick="window.print()">Print</button>
    </div>
</form>

<hr>
<h3>Records</h3>
<table class="table table-bordered" id="recordsTable">
    <thead>
        <tr>
            <th>Case Type</th>
            <th>Case Number</th>
            <th>Year</th>
            <th>Sent Court & Date</th>
            <th>Received Court & Date</th>
            <th>Typist Name & Date</th>
            <th>A.R Date</th>
            <th>Dispatch Date</th>
            <th>R.A Date</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    const form = document.getElementById('recordForm');
    const tableBody = document.querySelector('#recordsTable tbody');
    let records = [];

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const record = {
            caseType: 'Company Matter',
            caseNumber: document.getElementById('caseNumber').value,
            year: document.getElementById('year').value,
            sentCourtDate: document.getElementById('sentCourt').value + "\n" + document.getElementById('sentDate').value,
            receivedCourtDate: document.getElementById('receivedCourt').value + "\n" + document.getElementById('receivedDate').value,
            typistNameDate: document.getElementById('typistName').value + "\n" + document.getElementById('typistDate').value,
            arDate: document.getElementById('arDate').value,
            dispatchDate: document.getElementById('dispatchDate').value,
            raDate: document.getElementById('raDate').value
        };
        records.push(record);
        updateTable();
        form.reset();
    });

    function updateTable() {
        tableBody.innerHTML = '';
        records.forEach(r => {
            const row = `<tr>
                <td>${r.caseType}</td>
                <td>${r.caseNumber}</td>
                <td>${r.year}</td>
                <td>${r.sentCourtDate.replace("\n","<br>")}</td>
                <td>${r.receivedCourtDate.replace("\n","<br>")}</td>
                <td>${r.typistNameDate.replace("\n","<br>")}</td>
                <td>${r.arDate}</td>
                <td>${r.dispatchDate}</td>
                <td>${r.raDate}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont('Times', 'normal');
        doc.autoTable({ 
            head: [['Case Type','Case Number','Year','Sent Court & Date','Received Court & Date','Typist Name & Date','A.R Date','Dispatch Date','R.A Date']],
            body: records.map(r => [
                r.caseType,
                r.caseNumber,
                r.year,
                r.sentCourtDate,
                r.receivedCourtDate,
                r.typistNameDate,
                r.arDate,
                r.dispatchDate,
                r.raDate
            ]),
            styles: { font: 'Times', fontSize: 10 }
        });
        doc.save('court_records.pdf');
    }
</script>
</body>
</html>
