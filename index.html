<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Matter Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            background-color: #f8f9fa;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        table {
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2>Company Matter Records</h2>

    <!-- Form Section -->
    <div class="form-section">
        <div class="row mb-2">
            <div class="col-md-6">
                <label class="form-label">Case Type</label>
                <input type="text" id="caseType" class="form-control" placeholder="Company Matter Fixed">
            </div>
            <div class="col-md-3">
                <label class="form-label">Case Number</label>
                <input type="text" id="caseNumber" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label">Year</label>
                <input type="number" id="year" class="form-control">
            </div>
        </div>

        <!-- Sent Court & Date -->
        <div class="row mb-2">
            <div class="col-md-6">
                <label class="form-label">Sent Court</label>
                <select id="sentCourt" class="form-select">
                    <option value="">Select Court</option>
                    <option>31(B-71)</option>
                    <option>32(B-72)</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Sent Date</label>
                <input type="date" id="sentDate" class="form-control">
            </div>
        </div>

        <!-- Received Court & Date -->
        <div class="row mb-2">
            <div class="col-md-6">
                <label class="form-label">Received Court</label>
                <select id="receivedCourt" class="form-select">
                    <option value="">Select Court</option>
                    <option>31(B-71)</option>
                    <option>32(B-72)</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Received Date</label>
                <input type="date" id="receivedDate" class="form-control">
            </div>
        </div>

        <!-- Typist -->
        <div class="row mb-2">
            <div class="col-md-6">
                <label class="form-label">Typist Name</label>
                <input type="text" id="typistName" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Typist Date</label>
                <input type="date" id="typistDate" class="form-control">
            </div>
        </div>

        <!-- Other Dates -->
        <div class="row mb-2">
            <div class="col-md-4">
                <label class="form-label">A.R Sign Date</label>
                <input type="date" id="arSignDate" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Dispatch Date</label>
                <input type="date" id="dispatchDate" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">R.A Rakar Date</label>
                <input type="date" id="raRakarDate" class="form-control">
            </div>
        </div>

        <!-- Buttons -->
        <div class="mt-3">
            <button class="btn btn-success" onclick="addRecord()">Add Record</button>
            <button class="btn btn-primary" onclick="saveData()">Save Record</button>
            <button class="btn btn-danger" onclick="clearData()">Remove All</button>
            <button class="btn btn-warning" onclick="downloadPDF()">PDF</button>
            <button class="btn btn-info" onclick="window.print()">Print</button>
        </div>
    </div>

    <!-- Table -->
    <table class="table table-bordered" id="recordsTable">
        <thead class="table-dark">
            <tr>
                <th>Case Type</th>
                <th>Case No.</th>
                <th>Year</th>
                <th>Sent Court/Date</th>
                <th>Received Court/Date</th>
                <th>Typist</th>
                <th>Dates</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
let records = JSON.parse(localStorage.getItem("records")) || [];

function displayRecords() {
    const tableBody = document.querySelector("#recordsTable tbody");
    tableBody.innerHTML = "";
    records.forEach((rec, index) => {
        tableBody.innerHTML += `
            <tr>
                <td>${rec.caseType}</td>
                <td>${rec.caseNumber}</td>
                <td>${rec.year}</td>
                <td>${rec.sentCourt}<br>${rec.sentDate}</td>
                <td>${rec.receivedCourt}<br>${rec.receivedDate}</td>
                <td>${rec.typistName}<br>${rec.typistDate}</td>
                <td>
                    AR: ${rec.arSignDate}<br>
                    Dispatch: ${rec.dispatchDate}<br>
                    Rakar: ${rec.raRakarDate}
                </td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editRecord(${index})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteRecord(${index})">Delete</button>
                </td>
            </tr>
        `;
    });
}

function addRecord() {
    const rec = {
        caseType: document.getElementById("caseType").value,
        caseNumber: document.getElementById("caseNumber").value,
        year: document.getElementById("year").value,
        sentCourt: document.getElementById("sentCourt").value,
        sentDate: document.getElementById("sentDate").value,
        receivedCourt: document.getElementById("receivedCourt").value,
        receivedDate: document.getElementById("receivedDate").value,
        typistName: document.getElementById("typistName").value,
        typistDate: document.getElementById("typistDate").value,
        arSignDate: document.getElementById("arSignDate").value,
        dispatchDate: document.getElementById("dispatchDate").value,
        raRakarDate: document.getElementById("raRakarDate").value
    };
    records.push(rec);
    displayRecords();
}

function saveData() {
    localStorage.setItem("records", JSON.stringify(records));
    alert("Data saved!");
}

function clearData() {
    if (confirm("Are you sure to remove all data?")) {
        records = [];
        localStorage.removeItem("records");
        displayRecords();
    }
}

function editRecord(index) {
    const rec = records[index];
    document.getElementById("caseType").value = rec.caseType;
    document.getElementById("caseNumber").value = rec.caseNumber;
    document.getElementById("year").value = rec.year;
    document.getElementById("sentCourt").value = rec.sentCourt;
    document.getElementById("sentDate").value = rec.sentDate;
    document.getElementById("receivedCourt").value = rec.receivedCourt;
    document.getElementById("receivedDate").value = rec.receivedDate;
    document.getElementById("typistName").value = rec.typistName;
    document.getElementById("typistDate").value = rec.typistDate;
    document.getElementById("arSignDate").value = rec.arSignDate;
    document.getElementById("dispatchDate").value = rec.dispatchDate;
    document.getElementById("raRakarDate").value = rec.raRakarDate;
    deleteRecord(index);
}

function deleteRecord(index) {
    records.splice(index, 1);
    displayRecords();
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFont("Times", "normal");
    doc.text("Company Matter Records", 10, 10);
    let y = 20;
    records.forEach(rec => {
        doc.text(`Case: ${rec.caseType} ${rec.caseNumber}/${rec.year}`, 10, y);
        y += 6;
        doc.text(`Sent: ${rec.sentCourt} - ${rec.sentDate}`, 10, y);
        y += 6;
        doc.text(`Received: ${rec.receivedCourt} - ${rec.receivedDate}`, 10, y);
        y += 6;
        doc.text(`Typist: ${rec.typistName} (${rec.typistDate})`, 10, y);
        y += 6;
        doc.text(`AR: ${rec.arSignDate}, Dispatch: ${rec.dispatchDate}, Rakar: ${rec.raRakarDate}`, 10, y);
        y += 10;
    });
    doc.save("records.pdf");
}

displayRecords();
</script>
</body>
</html>
